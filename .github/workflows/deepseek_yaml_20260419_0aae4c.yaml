name: Monitor and Build ImmortalWrt (x86_64 Master)

on:
  schedule:
    - cron: '0 14 * * 1,4'
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建（忽略上游检查）'
        required: false
        default: false
        type: boolean

env:
  TARGET: x86
  SUBTARGET: 64
  WORKING_DIRECTORY: immortalwrt
  CONFIG_HISTORY_DIR: config-x86-64-history

jobs:
  check-upstream:
    runs-on: ubuntu-22.04
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: 获取远程最新 commit hash
        id: remote
        run: |
          LATEST=$(git ls-remote https://github.com/immortalwrt/immortalwrt master | cut -f1)
          echo "hash=$LATEST" >> $GITHUB_OUTPUT
      - name: 恢复上次构建的 commit hash 缓存
        id: cache-hash
        uses: actions/cache@v4
        with:
          path: .cache
          key: last-build-hash
      - name: 读取上次构建的 commit hash
        id: last
        run: |
          if [ -f .cache/last_commit_hash ]; then
            LAST_HASH=$(cat .cache/last_commit_hash)
          else
            LAST_HASH=""
          fi
          echo "hash=$LAST_HASH" >> $GITHUB_OUTPUT
      - name: 判断是否需要构建
        id: check
        run: |
          FORCE_BUILD="${{ github.event.inputs.force_build || false }}"
          REMOTE_HASH="${{ steps.remote.outputs.hash }}"
          LAST_HASH="${{ steps.last.outputs.hash }}"
          echo "远程最新 commit: $REMOTE_HASH"
          echo "上次构建 commit: $LAST_HASH"
          if [[ "$FORCE_BUILD" == "true" ]]; then
            echo "changed=true"
          elif [[ -z "$LAST_HASH" ]]; then
            echo "changed=true"
          elif [[ "$REMOTE_HASH" != "$LAST_HASH" ]]; then
            echo "changed=true"
          else
            echo "changed=false"
          fi >> $GITHUB_OUTPUT

  # ============================================================
  # Job 合并: 更新 feeds + 应用自定义修改 + 编译工具链 + 编译内核
  # ============================================================
  prepare-and-build-toolchain:
    runs-on: ubuntu-22.04
    needs: [check-upstream]
    if: needs.check-upstream.outputs.changed == 'true'
    timeout-minutes: 360   # 工具链+内核编译耗时较长
    outputs:
      commit_hash: ${{ steps.get_commit_hash.outputs.hash }}
      feeds_hash: ${{ steps.feeds_hash.outputs.hash }}
      timestamp: ${{ steps.set_timestamp.outputs.timestamp }}
    steps:
      - name: 释放磁盘空间
        run: df -h
      - name: 清理无用工具缓存
        run: |
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift /usr/local/julia* /usr/lib/jvm /usr/local/.ghcup /usr/local/share/chromium /usr/share/dotnet /usr/local/lib/android
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: 设置时间戳
        id: set_timestamp
        run: |
          TS="R86S-$(date +%Y%m%d-%H%M%S)"
          echo "timestamp=$TS" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$TS" >> $GITHUB_ENV
          echo "FORCE_UNSAFE_CONFIGURE=1" >> $GITHUB_ENV
      - name: 安装编译依赖
        run: |
          sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"
          sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"
      - name: 克隆 ImmortalWrt 源码
        run: |
          git clone --depth=1 --branch master https://github.com/immortalwrt/immortalwrt ${{ env.WORKING_DIRECTORY }}
          cd ${{ env.WORKING_DIRECTORY }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: 修复可执行权限
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          find . -name "*.sh" -exec chmod +x {} \;
          if [ -d scripts ]; then chmod +x scripts/* 2>/dev/null || true; fi
          if [ -d staging_dir/host/bin ]; then chmod +x staging_dir/host/bin/* 2>/dev/null || true; fi
      - name: 获取 Git Commit Hash
        id: get_commit_hash
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          HASH=$(git rev-parse --short HEAD)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "CURRENT_HASH=$HASH" >> $GITHUB_ENV
      - name: 计算 feeds 哈希
        id: feeds_hash
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          FEEDS_HASH=$(find feeds/ -type f -exec md5sum {} \; | sort | md5sum | cut -d' ' -f1)
          echo "hash=$FEEDS_HASH" >> $GITHUB_OUTPUT
      - name: 恢复 dl 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/dl
          key: dl-${{ steps.feeds_hash.outputs.hash }}
          restore-keys: dl-
      - name: 恢复 ccache 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/.ccache
          key: ccache-${{ steps.feeds_hash.outputs.hash }}-${{ hashFiles(format('{0}/.config', env.WORKING_DIRECTORY)) }}
          restore-keys: ccache-
      - name: 复制预定义配置
        run: |
          cp ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/R86S.config ${{ env.WORKING_DIRECTORY }}/.config
      - name: 移除不需要的 feeds 包
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          ./scripts/feeds uninstall ddns-go smartdns qBittorrent-Enhanced-Edition luci-app-smartdns luci-app-openclash luci-app-qbittorrent luci-app-unblockneteasemusic luci-app-ddns-go
      - name: 替换 libffi Makefile
        run: |
          cp ${{ github.workspace }}/package/libffi/Makefile ${{ env.WORKING_DIRECTORY }}/feeds/packages/libs/libffi/Makefile
      - name: 复制自定义 package 覆盖
        run: |
          cp -r ${{ github.workspace }}/package/* ${{ env.WORKING_DIRECTORY }}/package/feeds/
      - name: 运行 make defconfig
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make defconfig
      # ========== 以上是原 update-feeds 内容 ==========
      # ========== 以下是原 build-toolchain 内容（合并） ==========
      - name: 恢复 llvm-bpf 缓存（tarball）
        id: cache-llvm-bpf
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/bin/targets/*/llvm-bpf-*.tar.xz
          key: llvm-bpf-${{ steps.get_commit_hash.outputs.hash }}-${{ hashFiles(format('{0}/tools/llvm-bpf/Makefile', env.WORKING_DIRECTORY)) }}
      - name: 如果 llvm-bpf 缓存命中，则解压预编译的 tarball
        if: steps.cache-llvm-bpf.outputs.cache-hit == 'true'
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          TARBALL=$(find bin/targets/ -name "llvm-bpf-*.tar.xz" | head -n1)
          if [ -n "$TARBALL" ]; then
            mkdir -p staging_dir/host/
            tar -xf $TARBALL -C staging_dir/host/
          fi
      - name: 编译工具链
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make toolchain/compile -j$(nproc) V=sc
      - name: 编译内核
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make target/compile -j$(nproc) V=sc
      - name: 记录磁盘空间使用（工具链+内核编译后）
        run: |
          echo "=== Job prepare-and-build-toolchain 完成 ===" >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          du -sh ${{ env.WORKING_DIRECTORY }} | grep -oE '[0-9.]+[A-Z]' >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          df -h
      - name: 上传源码 artifact（供后续 job 使用）
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-source
          path: ${{ env.WORKING_DIRECTORY }}/
          retention-days: 1
      - name: 上传工具链 artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-toolchain
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/
          retention-days: 1
      - name: 保存本次构建的 commit hash 到缓存（供下次检查）
        run: |
          mkdir -p .cache
          echo "${{ steps.get_commit_hash.outputs.hash }}" > .cache/last_commit_hash
      - name: 保存 commit hash 缓存
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: last-build-hash

  # ============================================================
  # Job 3: 编译 Node.js（独立缓存）
  # ============================================================
  build-node:
    runs-on: ubuntu-22.04
    needs: [check-upstream, prepare-and-build-toolchain]
    if: needs.check-upstream.outputs.changed == 'true'
    timeout-minutes: 360
    steps:
      - name: 释放磁盘空间
        run: df -h
      - name: 清理无用工具缓存
        run: |
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift /usr/local/julia* /usr/lib/jvm /usr/local/.ghcup /usr/local/share/chromium /usr/share/dotnet /usr/local/lib/android
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: 安装编译依赖
        run: |
          sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"
          sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"
      - name: 下载源码 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-source
          path: ${{ env.WORKING_DIRECTORY }}
      - name: 下载工具链 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-toolchain
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/
      - name: 设置环境变量
        run: |
        
          ls -la
        
          cd ${{ env.WORKING_DIRECTORY }}
          ls -la
          
          echo "CURRENT_HASH=${{ needs.prepare-and-build-toolchain.outputs.commit_hash }}" >> $GITHUB_ENV
          echo "TIMESTAMP=${{ needs.prepare-and-build-toolchain.outputs.timestamp }}" >> $GITHUB_ENV
      - name: 恢复 dl 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/dl
          key: dl-${{ needs.prepare-and-build-toolchain.outputs.feeds_hash }}
          restore-keys: dl-
      - name: 缓存 Node.js 构建目录
        id: cache-node
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.WORKING_DIRECTORY }}/build_dir/target-*/node-*
            ${{ env.WORKING_DIRECTORY }}/staging_dir/host/bin/node
            ~/.npm
          key: node-build-${{ needs.prepare-and-build-toolchain.outputs.feeds_hash }}
      - name: 修复可执行权限
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          find . -name "*.sh" -exec chmod +x {} \;
          if [ -d scripts ]; then chmod +x scripts/* 2>/dev/null || true; fi
          if [ -d staging_dir/host/bin ]; then chmod +x staging_dir/host/bin/* 2>/dev/null || true; fi

      - name: 移除工件中无效的编译器软链接
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          # 删除 staging_dir/host/bin 下所有 gcc、g++ 相关的软链接
          rm -f staging_dir/host/bin/gcc staging_dir/host/bin/g++ staging_dir/host/bin/cc staging_dir/host/bin/c++
          # 或者更彻底：删除整个 host/bin 目录（保留也无妨，但删除更干净）
          # rm -rf staging_dir/host/bin
          # 确保系统 PATH 优先
          echo "PATH=/usr/bin:$PATH" >> $GITHUB_ENV
          
      - name: 验证 gcc 路径
        run: |
         which gcc
         gcc --version
         
      - name: 调试工件解压后的目录结构
        run: |
          echo "=== 查看 immortalwrt 根目录 ==="
          ls -la ${{ env.WORKING_DIRECTORY }}/
          echo "=== 查看 staging_dir 目录 ==="
          ls -la ${{ env.WORKING_DIRECTORY }}/staging_dir/
          echo "=== 查看 staging_dir/host/bin 目录 ==="
          ls -la ${{ env.WORKING_DIRECTORY }}/staging_dir/host/bin/ | head -20
          echo "=== 检查 gcc 是否在 staging_dir/host/bin 中 ==="
          ls ${{ env.WORKING_DIRECTORY }}/staging_dir/host/bin/gcc* 2>/dev/null || echo "无 gcc"
          echo "=== 当前 PATH ==="
          echo $PATH
          echo "=== which gcc ==="
          which gcc || echo "gcc not in PATH"
          echo "=== gcc --version ==="
          gcc --version || echo "gcc 不可用"        
      - name: 编译 Node.js（缓存未命中时）
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make package/feeds/packages/node/compile -j$(nproc) V=sc
      - name: 记录磁盘空间使用
        run: |
          echo "=== Job build-node 完成 ===" >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          du -sh ${{ env.WORKING_DIRECTORY }} | grep -oE '[0-9.]+[A-Z]' >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          df -h
      - name: 上传 Node.js 二进制 artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-node-binaries
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/host/bin/node
          retention-days: 1

  # ============================================================
  # Job 4: 编译所有其他软件包
  # ============================================================
  build-packages:
    runs-on: ubuntu-22.04
    needs: [check-upstream, prepare-and-build-toolchain, build-node]
    if: needs.check-upstream.outputs.changed == 'true'
    timeout-minutes: 300
    steps:
      - name: 释放磁盘空间
        run: df -h
      - name: 清理无用工具缓存
        run: |
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift /usr/local/julia* /usr/lib/jvm /usr/local/.ghcup /usr/local/share/chromium /usr/share/dotnet /usr/local/lib/android
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: 安装编译依赖
        run: |
          sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"
          sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"
      - name: 下载源码 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-source
          path: ${{ env.WORKING_DIRECTORY }}
      - name: 下载工具链 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-toolchain
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/
      - name: 下载 Node.js 二进制
        uses: actions/download-artifact@v4
        with:
          name: openwrt-node-binaries
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/host/bin/
      - name: 赋予 node 执行权限
        run: chmod +x ${{ env.WORKING_DIRECTORY }}/staging_dir/host/bin/node
      - name: 设置环境变量
        run: |
          echo "CURRENT_HASH=${{ needs.prepare-and-build-toolchain.outputs.commit_hash }}" >> $GITHUB_ENV
          echo "TIMESTAMP=${{ needs.prepare-and-build-toolchain.outputs.timestamp }}" >> $GITHUB_ENV
      - name: 恢复 dl 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/dl
          key: dl-${{ needs.prepare-and-build-toolchain.outputs.feeds_hash }}
          restore-keys: dl-
      - name: 恢复 ccache 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/.ccache
          key: ccache-${{ needs.prepare-and-build-toolchain.outputs.feeds_hash }}-${{ hashFiles(format('{0}/.config', env.WORKING_DIRECTORY)) }}
          restore-keys: ccache-
      - name: 修复可执行权限
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          find . -name "*.sh" -exec chmod +x {} \;
          if [ -d scripts ]; then chmod +x scripts/* 2>/dev/null || true; fi
          if [ -d staging_dir/host/bin ]; then chmod +x staging_dir/host/bin/* 2>/dev/null || true; fi
      - name: 编译所有软件包
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make package/compile -j$(nproc) V=sc
      - name: 记录磁盘空间使用
        run: |
          echo "=== Job build-packages 完成 ===" >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          du -sh ${{ env.WORKING_DIRECTORY }} | grep -oE '[0-9.]+[A-Z]' >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          df -h
      - name: 上传软件包 artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-packages
          path: ${{ env.WORKING_DIRECTORY }}/bin/packages/
          retention-days: 1

  # ============================================================
  # Job 5: 生成最终固件
  # ============================================================
  build-firmware:
    runs-on: ubuntu-22.04
    needs: [check-upstream, prepare-and-build-toolchain, build-packages]
    if: needs.check-upstream.outputs.changed == 'true'
    timeout-minutes: 300
    steps:
      - name: 释放磁盘空间
        run: df -h
      - name: 清理无用工具缓存
        run: |
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift /usr/local/julia* /usr/lib/jvm /usr/local/.ghcup /usr/local/share/chromium /usr/share/dotnet /usr/local/lib/android
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: 安装编译依赖
        run: |
          sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"
          sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"
      - name: 下载源码 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-source
          path: ${{ env.WORKING_DIRECTORY }}
      - name: 下载工具链 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-toolchain
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/
      - name: 下载软件包 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-packages
          path: ${{ env.WORKING_DIRECTORY }}/bin/packages/
      - name: 设置环境变量
        run: |
          echo "CURRENT_HASH=${{ needs.prepare-and-build-toolchain.outputs.commit_hash }}" >> $GITHUB_ENV
          echo "TIMESTAMP=${{ needs.prepare-and-build-toolchain.outputs.timestamp }}" >> $GITHUB_ENV
      - name: 恢复 dl 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/dl
          key: dl-${{ needs.prepare-and-build-toolchain.outputs.feeds_hash }}
          restore-keys: dl-
      - name: 修复可执行权限
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          find . -name "*.sh" -exec chmod +x {} \;
          if [ -d scripts ]; then chmod +x scripts/* 2>/dev/null || true; fi
          if [ -d staging_dir/host/bin ]; then chmod +x staging_dir/host/bin/* 2>/dev/null || true; fi
      - name: 生成最终固件
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make target/image.compile -j$(nproc) V=sc
      - name: 上传固件 artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86-64-images
          path: ${{ env.WORKING_DIRECTORY }}/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*squashfs-combined-efi.img.gz
          retention-days: 7
          if-no-files-found: warn
      - name: 保存配置文件
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          cp .config bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/config-latest.txt
          mkdir -p ../config-artifacts
          cp .config ../config-artifacts/immortalwrt-x86-64-config.txt
      - name: 上传单独配置文件 artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86-64-config
          path: config-artifacts/
          retention-days: 30
          if-no-files-found: error
      - name: 上传固件到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: R86S-nightly
          files: |
            ${{ env.WORKING_DIRECTORY }}/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*squashfs-combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 记录磁盘空间使用
        run: |
          echo "=== Job build-firmware 完成 ===" >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          du -sh ${{ env.WORKING_DIRECTORY }} | grep -oE '[0-9.]+[A-Z]' >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          df -h
      - name: 清理旧配置和空间使用记录文件（保留最近5个）
        run: |
          cd $GITHUB_WORKSPACE/${{ env.CONFIG_HISTORY_DIR }}
          CONFIG_COUNT=$(find . -maxdepth 1 -name 'config-*.txt' | wc -l)
          if [ $CONFIG_COUNT -gt 5 ]; then
            ls -1t config-*.txt | tail -n +6 | xargs -r rm -f
          fi
          SPACE_COUNT=$(find . -maxdepth 1 -name 'space_usage-*.log' | wc -l)
          if [ $SPACE_COUNT -gt 5 ]; then
            ls -1t space_usage-*.log | tail -n +6 | xargs -r rm -f
          fi
      - name: 提交配置文件到仓库
        run: |
          cd $GITHUB_WORKSPACE
          git config user.email "swlplay@gmail.com"
          git config user.name "swlplay"
          git pull --rebase origin master
          git add ${{ env.CONFIG_HISTORY_DIR }}/
          if ! git diff --staged --quiet; then
            git commit -m "Update R86S-ImmortalWrt [skip ci]"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          fi
