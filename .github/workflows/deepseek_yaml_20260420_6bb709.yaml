name: Step-by-Step Build with Artifact Passing

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-stage1:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3 python3-distutils python3-setuptools rsync unzip zlib1g-dev \
          file wget

      - name: Clone source
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for x86_64
        working-directory: source
        run: |
          echo "CONFIG_TARGET_x86=y" > .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
          make defconfig

      - name: Download all sources
        working-directory: source
        run: make download -j$(nproc) V=s

      - name: Build toolchain and kernel only
        working-directory: source
        run: |
          # 仅编译工具链
          make toolchain/compile -j$(nproc) V=s
          # 编译内核（含模块），但不编译软件包
          make target/linux/compile -j$(nproc) V=s

      - name: Package essential build artifacts
        run: |
          cd source
          # 保留必要的中间目录，压缩时排除 .o 等临时文件以减小体积
          tar -czf build-artifacts-stage1.tar.gz \
            --exclude='*.o' \
            --exclude='*.a' \
            --exclude='*.la' \
            --exclude='*.po' \
            .config \
            feeds \
            dl \
            staging_dir/host \
            staging_dir/toolchain-* \
            build_dir/target-* \
            build_dir/host \
            scripts \
            include \
            tools \
            toolchain \
            package \
            target

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-stage1
          path: source/build-artifacts-stage1.tar.gz
          retention-days: 1

  build-stage2:
    runs-on: ubuntu-22.04
    needs: build-stage1
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3 python3-distutils python3-setuptools rsync unzip zlib1g-dev \
          file wget

      - name: Download stage1 artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-stage1
          path: .

      - name: Extract artifacts
        run: |
          mkdir source
          tar -xzf build-artifacts-stage1.tar.gz -C source
          rm build-artifacts-stage1.tar.gz

      - name: Continue building packages and firmware
        working-directory: source
        run: |
          # 继续编译所有软件包和最终固件
          make -j$(nproc) V=s