 
name: Monitor and Build ImmortalWrt (x86_64 Master)

on:
  # 定时触发：每周二18点检查更新（UTC时间）
  schedule:
    - cron: '0 18 * * 2'
  
  # 代码推送触发：推送到 master 分支时触发
  push:
    branches: [ master ]
  
  # Pull Request 触发：针对 master 分支的 PR 时触发
  pull_request:
    branches: [ master ]
  
  # 手动触发：允许在网页上手动触发
  workflow_dispatch:

env:
  TARGET: x86
  SUBTARGET: 64
  WORKING_DIRECTORY: immortalwrt-x86
  SPACE_USAGE: R86S_space_usage
  CONFIG_HISTORY_DIR: config-x86-64-history  # 新增配置历史目录变量

jobs:
 check-and-build:
  runs-on: ubuntu-22.04
  permissions:
    contents: write          # ← 保留在这里

  steps:
    - name: 释放前查看磁盘空间
      run: df -h

    - name: 手动删除额外工具缓存并清理 apt 缓存
      run: |
        echo "删除 /opt/hostedtoolcache ..."
        sudo rm -rf /opt/hostedtoolcache
        echo "删除其他大目录 ..."
        sudo rm -rf /usr/share/swift /usr/local/julia* /usr/lib/jvm /usr/local/.ghcup /usr/local/share/chromium /usr/share/dotnet /usr/local/lib/android
    
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # 确保拉取所有分支和历史，以便后续推送
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 安装编译依赖
      run: |
        sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"

        sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"
           
    - name: 编译依赖按装后磁盘空间
      run: df -h
        
    - name: Check for updates in master branch
      id: check-update
      shell: bash
      run: |
        git config --global --add safe.directory '*'       
        git clone -b master --single-branch --filter=blob:none https://github.com/immortalwrt/immortalwrt $WORKING_DIRECTORY
        LATEST_COMMIT_HASH=$(git rev-parse HEAD)
        echo "latest_commit=$LATEST_COMMIT_HASH" >> $GITHUB_OUTPUT
        echo "CURRENT_HASH=$LATEST_COMMIT_HASH" >> $GITHUB_ENV
        echo "FORCE_UNSAFE_CONFIGURE=1" >> $GITHUB_ENV
        echo "TIMESTAMP=AX3600-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
        echo "Latest commit hash: $LATEST_COMMIT_HASH"

    - name: Restore cached commit hash
      id: cache-hash
      uses: actions/cache@v4
      with:
        path: .cache
        key: immortalwrt-${{ env.CURRENT_HASH }}
        restore-keys: |
          immortalwrt-

    - name: Build ImmortalWrt if source updated
      shell: bash
      run: |
        set -ex
        mkdir -p $GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR
        cd $GITHUB_WORKSPACE/$WORKING_DIRECTORY/
         
        # 初始化空间使用记录
        echo "初始状态:" > $GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/$SPACE_USAGE-$TIMESTAMP.log
        du -sh . | grep -oE '[0-9.]+[A-Z]' >> $GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/$SPACE_USAGE-$TIMESTAMP.log
        
        echo "开始更新feeds..."
        ./scripts/feeds update -a

        ./scripts/feeds install -a
        
        ./scripts/feeds uninstall ddns-go smartdns qBittorrent-Enhanced-Edition luci-app-smartdns luci-app-openclash luci-app-qbittorrent luci-app-unblockneteasemusic luci-app-ddns-go

        cd $GITHUB_WORKSPACE/$WORKING_DIRECTORY/feeds/packages/libs/libffi/
        ls -la

        cd $GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/libffi/
        ls -la

        cp Makefile $GITHUB_WORKSPACE/$WORKING_DIRECTORY/feeds/packages/libs/libffi/Makefile
        ls -la

        cp -r $GITHUB_WORKSPACE/package/* $GITHUB_WORKSPACE/$WORKING_DIRECTORY/package/feeds/
        

        cd $GITHUB_WORKSPACE/$WORKING_DIRECTORY/feeds/packages/libs/libffi/
        ls -la

        echo "配置编译目标为 $TARGET/$SUBTARGET..."
        # 复制预定义的配置
        cd $GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/
        ls -la

        cp R86S1.config $GITHUB_WORKSPACE/$WORKING_DIRECTORY/.config
        cd $GITHUB_WORKSPACE/$WORKING_DIRECTORY/                       
        ls -la
        
        make defconfig
        ls -la
        
        cd $GITHUB_WORKSPACE/$WORKING_DIRECTORY/package/feeds/
        ls -la

    - name: Build Packages in Batches
      run: |
        echo "=== 整体编译 ==="
        cd $GITHUB_WORKSPACE/$WORKING_DIRECTORY/
        make -j2 V=c

        echo "整体编译:" >> $GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/$SPACE_USAGE-$TIMESTAMP.log
        du -sh . | grep -oE '[0-9.]+[A-Z]' >> $GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/$SPACE_USAGE-$TIMESTAMP.log
    
        df -h

    - name: Prepare cache marker
      if: steps.cache-hash.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p .cache
        echo "Build completed for commit: ${{ env.CURRENT_HASH }}" > .cache/build-info.txt
        echo "构建完成时间: $(date)" >> .cache/build-info.txt

    - name: Upload build artifacts (固件和配置)
      if: steps.cache-hash.outputs.cache-hit != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: immortalwrt-x86-64-images
        path: ${{ env.WORKING_DIRECTORY }}/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*squashfs-combined-efi.img.gz
        retention-days: 7
        if-no-files-found: warn

    - name: Generate and save config files
      shell: bash
      if: steps.cache-hash.outputs.cache-hit != 'true'
      run: |
        cd "$WORKING_DIRECTORY"
        
        # 保存带时间戳的配置文件到新目录
        cp .config $GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/config-$TIMESTAMP.txt
        
        # 保存最新配置文件到构建产物目录
        mkdir -p bin/targets/$TARGET/$SUBTARGET/
        cp .config bin/targets/$TARGET/$SUBTARGET/config-latest.txt
        
        # 为单独配置文件构建物创建目录
        mkdir -p ../config-artifacts
        cp .config ../config-artifacts/immortalwrt-x86-64-config.txt
        
        echo "配置文件已保存：$CONFIG_HISTORY_DIR/config-$TIMESTAMP.txt"

    - name: Upload config artifacts (单独配置文件)
      if: steps.cache-hash.outputs.cache-hit != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: immortalwrt-x86-64-config
        path: config-artifacts/
        retention-days: 30
        if-no-files-found: error
     
    - name: 清理旧配置和空间使用记录文件（保留最近20个）
      shell: bash
      if: steps.cache-hash.outputs.cache-hit != 'true'
      run: |
        cd $GITHUB_WORKSPACE/${{ env.CONFIG_HISTORY_DIR }}
        ls -la
          
        # 清理旧配置文件（保留最近20个）
        CONFIG_COUNT=$(find . -maxdepth 1 -name 'config-*.txt' | wc -l)
        if [ $CONFIG_COUNT -gt 20 ]; then
          ls -1t config-*.txt | tail -n +21 | xargs -r rm -f
          echo "已清理旧配置文件，保留最近20个"
        else
          echo "配置文件数量不足20个（当前 $CONFIG_COUNT 个），跳过清理"
        fi
          
        # 清理旧空间使用记录文件（保留最近20个）
        SPACE_COUNT=$(find . -maxdepth 1 -name '$SPACE_USAGE-*.log' | wc -l)
        if [ $SPACE_COUNT -gt 20 ]; then
          ls -1t $SPACE_USAGE-*.log | tail -n +21 | xargs -r rm -f
          echo "已清理旧空间使用记录文件，保留最近20个"
        else
          echo "空间使用记录文件数量不足20个（当前 $SPACE_COUNT 个），跳过清理"
        fi
    
    - name: Commit config files to repository
      shell: bash
      if: steps.cache-hash.outputs.cache-hit != 'true'
      run: |
        # 切换回仓库根目录
        cd "$GITHUB_WORKSPACE"
        echo "工作目录内容:"
        ls -la
               
        # 配置 Git
        git config user.email "swlplay@gmail.com"
        git config user.name "swlplay"
        
        # 先拉取远程更改（避免冲突）
        git pull --rebase origin main
        
        # 添加配置目录（使用新的目录名）
        git add "$CONFIG_HISTORY_DIR/"
        
        # 只在有变化时提交
        if git diff --staged --quiet; then
          echo "配置文件无变化，跳过提交"
        else
          git commit -m "Update ImmortalWrt configuration history [skip ci]"
          # 使用 token 推送
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          echo "配置文件已提交到仓库的 $CONFIG_HISTORY_DIR 目录"
        fi

    - name: Upload squashfs-combined-efi firmware to Release
      uses: softprops/action-gh-release@v2
      with:
        # 精确匹配以 squashfs-combined-efi.img.gz 结尾的文件
        tag_name: x86_64-nightly
        files: |
          ${{ env.WORKING_DIRECTORY }}/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*squashfs-combined-efi.img.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 

    - name: Build skipped due to cache
      shell: bash
      if: steps.cache-hash.outputs.cache-hit == 'true'
      run: |
        echo "构建已跳过 - 提交 ${{ env.CURRENT_HASH }} 之前已经构建过"
        echo "如需强制重新构建，请删除缓存或等待新的提交"

    - name: Save build cache
      if: steps.cache-hash.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: .cache
        key: immortalwrt-${{ env.CURRENT_HASH }}