name: Monitor and Build ImmortalWrt (x86_64 Master)

on:
  # 定时触发：每周一、周四晚上22:00（北京时间）检查更新（UTC时间14:00）
  schedule:
    - cron: '0 14 * * 1,4'
  
  # 代码推送触发：推送到 master 分支时触发
  push:
    branches: [ master ]

  # Pull Request 触发：针对 master 分支的 PR 时触发
  pull_request:
    branches: [ master ]

  # 手动触发：允许在网页上手动触发
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建（忽略上游检查）'
        required: false
        default: false
        type: boolean

env:
  TARGET: x86
  SUBTARGET: 64
  WORKING_DIRECTORY: immortalwrt
  CONFIG_HISTORY_DIR: config-x86-64-history

jobs:
  # ============================================================
  # Job 0: 前置检查 - 检测上游源码是否有变化
  # ============================================================
  check-upstream:
    runs-on: ubuntu-22.04
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: 获取远程最新 commit hash
        id: remote
        run: |
          LATEST=$(git ls-remote https://github.com/immortalwrt/immortalwrt master | cut -f1)
          echo "hash=$LATEST" >> $GITHUB_OUTPUT

      - name: 恢复上次构建的 commit hash 缓存
        id: cache-hash
        uses: actions/cache@v4
        with:
          path: .cache
          key: last-build-hash

      - name: 读取上次构建的 commit hash
        id: last
        run: |
          if [ -f .cache/last_commit_hash ]; then
            LAST_HASH=$(cat .cache/last_commit_hash)
          else
            LAST_HASH=""
          fi
          echo "hash=$LAST_HASH" >> $GITHUB_OUTPUT

      - name: 判断是否需要构建
        id: check
        run: |
          FORCE_BUILD="${{ github.event.inputs.force_build || false }}"
          REMOTE_HASH="${{ steps.remote.outputs.hash }}"
          LAST_HASH="${{ steps.last.outputs.hash }}"
          echo "远程最新 commit: $REMOTE_HASH"
          echo "上次构建 commit: $LAST_HASH"
          if [[ "$FORCE_BUILD" == "true" ]]; then
            echo "强制构建模式已启用"
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [[ -z "$LAST_HASH" ]]; then
            echo "首次运行，需要构建"
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [[ "$REMOTE_HASH" != "$LAST_HASH" ]]; then
            echo "上游源码有变化，需要构建"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "源码无变化，跳过构建"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # Job 1: 更新 feeds + 应用自定义修改 + 缓存 dl/ccache
  # ============================================================
  update-feeds:
    runs-on: ubuntu-22.04
    needs: [check-upstream]
    if: needs.check-upstream.outputs.changed == 'true'
    timeout-minutes: 60
    outputs:
      commit_hash: ${{ steps.get_commit_hash.outputs.hash }}
      feeds_hash: ${{ steps.feeds_hash.outputs.hash }}
    steps:
      - name: 释放磁盘空间
        run: df -h

      - name: 清理无用工具缓存
        run: |
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift /usr/local/julia* /usr/lib/jvm /usr/local/.ghcup /usr/local/share/chromium /usr/share/dotnet /usr/local/lib/android

      - name: Checkout 仓库（含配置历史）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置时间戳和当前哈希环境变量
        run: |
          echo "TIMESTAMP=R86S-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          echo "FORCE_UNSAFE_CONFIGURE=1" >> $GITHUB_ENV

      - name: 安装编译依赖
        run: |
          sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"

          sudo -E bash "$GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/init_build_environment.sh"

      - name: 克隆 ImmortalWrt 源码（每次全新）
        run: |
          git clone --depth=1 --branch master https://github.com/immortalwrt/immortalwrt ${{ env.WORKING_DIRECTORY }}
          cd ${{ env.WORKING_DIRECTORY }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 获取 Git Commit Hash
        id: get_commit_hash
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          HASH=$(git rev-parse --short HEAD)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "CURRENT_HASH=$HASH" >> $GITHUB_ENV

      - name: 计算 feeds 哈希（用于 dl 缓存）
        id: feeds_hash
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          FEEDS_HASH=$(find feeds/ -type f -exec md5sum {} \; | sort | md5sum | cut -d' ' -f1)
          echo "hash=$FEEDS_HASH" >> $GITHUB_OUTPUT

      - name: 恢复 dl 缓存（源码包）
        uses: actions/cache@v4
        id: dl-cache
        with:
          path: ${{ env.WORKING_DIRECTORY }}/dl
          key: dl-${{ steps.feeds_hash.outputs.hash }}
          restore-keys: dl-

      - name: 恢复 ccache 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/.ccache
          key: ccache-${{ steps.feeds_hash.outputs.hash }}-${{ hashFiles(format('{0}/.config', env.WORKING_DIRECTORY)) }}
          restore-keys: ccache-

      # ========== 开始应用自定义修改 ==========
      - name: 复制预定义配置
        run: |
          cp ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/R86S.config ${{ env.WORKING_DIRECTORY }}/.config
          cd ${{ env.WORKING_DIRECTORY }}
          ls -la

      - name: 移除不需要的 feeds 包
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          ./scripts/feeds uninstall ddns-go smartdns qBittorrent-Enhanced-Edition luci-app-smartdns luci-app-openclash luci-app-qbittorrent luci-app-unblockneteasemusic luci-app-ddns-go

      - name: 替换 libffi Makefile
        run: |
          cd ${{ env.WORKING_DIRECTORY }}/feeds/packages/libs/libffi/
          ls -la
          
          cp ${{ github.workspace }}/package/libffi/Makefile \
             ${{ github.workspace }}/${{ env.WORKING_DIRECTORY }}/feeds/packages/libs/libffi/Makefile
          ls -la

      - name: 复制自定义 package 覆盖
        run: |
          cd ${{ env.WORKING_DIRECTORY }}/package/feeds/
          ls -la

          cp -r ${{ github.workspace }}/package/* ${{ github.workspace }}/${{ env.WORKING_DIRECTORY }}/package/feeds/

          ls -la

      - name: 运行 make defconfig
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make defconfig
          ls -la

      # ========== 自定义修改结束 ==========

      - name: 记录磁盘空间使用（更新feeds后）
        run: |
          echo "=== Job update-feeds 完成 ===" >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          du -sh ${{ env.WORKING_DIRECTORY }} | grep -oE '[0-9.]+[A-Z]' >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          df -h

      - name: 上传源码 artifact（包含 dl，供后续 job 使用）
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-source
          path: ${{ env.WORKING_DIRECTORY }}/
          retention-days: 1

      - name: 保存本次构建的 commit hash 到缓存（供下次检查）
        run: |
          mkdir -p .cache
          echo "${{ steps.get_commit_hash.outputs.hash }}" > .cache/last_commit_hash

      - name: 保存 commit hash 缓存
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: last-build-hash

  # ============================================================
  # Job 2: 编译 LLVM BPF（独立缓存）
  # ============================================================
  build-llvm-bpf:
    runs-on: ubuntu-22.04
    needs: [check-upstream, update-feeds]
    if: needs.check-upstream.outputs.changed == 'true'
    timeout-minutes: 300
    steps:
      - name: 下载源码 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-source
          path: ${{ env.WORKING_DIRECTORY }}

      - name: 恢复 LLVM BPF 缓存
        id: cache-llvm-bpf
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/bin/targets/*/llvm-bpf-*.tar.xz
          key: llvm-bpf-${{ needs.update-feeds.outputs.commit_hash }}-${{ hashFiles(format('{0}/tools/llvm-bpf/Makefile', env.WORKING_DIRECTORY)) }}

      - name: 编译 LLVM BPF（缓存未命中时）
        if: steps.cache-llvm-bpf.outputs.cache-hit != 'true'
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make tools/llvm-bpf/compile -j$(nproc) V=sc

      - name: 记录磁盘空间使用（LLVM BPF 编译后）
        run: |
          echo "=== Job build-llvm-bpf 完成 ===" >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          du -sh ${{ env.WORKING_DIRECTORY }} | grep -oE '[0-9.]+[A-Z]' >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          df -h

      - name: 上传 LLVM BPF tarball（可选）
        uses: actions/upload-artifact@v4
        with:
          name: llvm-bpf-tarball
          path: ${{ env.WORKING_DIRECTORY }}/bin/targets/*/llvm-bpf-*.tar.xz
          retention-days: 1

  # ============================================================
  # Job 3: 编译工具链 + 内核（复用 LLVM BPF 缓存）
  # ============================================================
  build-toolchain:
    runs-on: ubuntu-22.04
    needs: [check-upstream, update-feeds, build-llvm-bpf]
    if: needs.check-upstream.outputs.changed == 'true'
    timeout-minutes: 300
    steps:
      - name: 下载源码 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-source
          path: ${{ env.WORKING_DIRECTORY }}

      - name: 恢复 LLVM BPF 缓存
        id: cache-llvm-bpf
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/bin/targets/*/llvm-bpf-*.tar.xz
          key: llvm-bpf-${{ needs.update-feeds.outputs.commit_hash }}-${{ hashFiles(format('{0}/tools/llvm-bpf/Makefile', env.WORKING_DIRECTORY)) }}

      - name: 使用预编译的 LLVM BPF（如果缓存命中）
        if: steps.cache-llvm-bpf.outputs.cache-hit == 'true'
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          TARBALL=$(find bin/targets/ -name "llvm-bpf-*.tar.xz" | head -n1)
          if [ -n "$TARBALL" ]; then
            mkdir -p staging_dir/host/
            tar -xf $TARBALL -C staging_dir/host/
          fi

      - name: 恢复 dl 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/dl
          key: dl-${{ needs.update-feeds.outputs.feeds_hash }}
          restore-keys: dl-

      - name: 恢复 ccache 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/.ccache
          key: ccache-${{ needs.update-feeds.outputs.feeds_hash }}-${{ hashFiles(format('{0}/.config', env.WORKING_DIRECTORY)) }}
          restore-keys: ccache-

      - name: 编译工具链和内核（每次都全新）
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make toolchain/compile -j$(nproc) V=sc
          make target/compile -j$(nproc) V=sc

      - name: 记录磁盘空间使用（工具链编译后）
        run: |
          echo "=== Job build-toolchain 完成 ===" >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          du -sh ${{ env.WORKING_DIRECTORY }} | grep -oE '[0-9.]+[A-Z]' >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          df -h

      - name: 上传工具链 artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-toolchain
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/
          retention-days: 1

  # ============================================================
  # Job 4: 编译 Node.js（独立缓存）
  # ============================================================
  build-node:
    runs-on: ubuntu-22.04
    needs: [check-upstream, update-feeds, build-toolchain]
    if: needs.check-upstream.outputs.changed == 'true'
    timeout-minutes: 360
    steps:
      - name: 下载源码 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-source
          path: ${{ env.WORKING_DIRECTORY }}

      - name: 下载工具链 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-toolchain
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/

      - name: 恢复 dl 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/dl
          key: dl-${{ needs.update-feeds.outputs.feeds_hash }}
          restore-keys: dl-

      - name: 缓存 Node.js 构建目录
        id: cache-node
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.WORKING_DIRECTORY }}/build_dir/target-*/node-*
            ${{ env.WORKING_DIRECTORY }}/staging_dir/host/bin/node
            ~/.npm
          key: node-build-${{ needs.update-feeds.outputs.feeds_hash }}

      - name: 编译 Node.js（缓存未命中时）
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make package/feeds/packages/node/compile -j$(nproc) V=sc

      - name: 记录磁盘空间使用（Node.js 编译后）
        run: |
          echo "=== Job build-node 完成 ===" >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          du -sh ${{ env.WORKING_DIRECTORY }} | grep -oE '[0-9.]+[A-Z]' >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          df -h

      - name: 上传 Node.js 二进制 artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-node-binaries
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/host/bin/node
          retention-days: 1

  # ============================================================
  # Job 5: 编译所有其他软件包
  # ============================================================
  build-packages:
    runs-on: ubuntu-22.04
    needs: [check-upstream, update-feeds, build-toolchain, build-node]
    if: needs.check-upstream.outputs.changed == 'true'
    timeout-minutes: 300
    steps:
      - name: 下载源码 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-source
          path: ${{ env.WORKING_DIRECTORY }}

      - name: 下载工具链 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-toolchain
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/

      - name: 下载 Node.js 二进制
        uses: actions/download-artifact@v4
        with:
          name: openwrt-node-binaries
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/host/bin/

      - name: 赋予 node 执行权限
        run: chmod +x ${{ env.WORKING_DIRECTORY }}/staging_dir/host/bin/node

      - name: 恢复 dl 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/dl
          key: dl-${{ needs.update-feeds.outputs.feeds_hash }}
          restore-keys: dl-

      - name: 恢复 ccache 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/.ccache
          key: ccache-${{ needs.update-feeds.outputs.feeds_hash }}-${{ hashFiles(format('{0}/.config', env.WORKING_DIRECTORY)) }}
          restore-keys: ccache-

      - name: 编译所有软件包（每次都全新）
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make package/compile -j$(nproc) V=sc

      - name: 记录磁盘空间使用（软件包编译后）
        run: |
          echo "=== Job build-packages 完成 ===" >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          du -sh ${{ env.WORKING_DIRECTORY }} | grep -oE '[0-9.]+[A-Z]' >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          df -h

      - name: 上传软件包 artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-packages
          path: ${{ env.WORKING_DIRECTORY }}/bin/packages/
          retention-days: 1

  # ============================================================
  # Job 6: 生成最终固件并上传 Release / 配置文件
  # ============================================================
  build-firmware:
    runs-on: ubuntu-22.04
    needs: [check-upstream, update-feeds, build-packages]
    if: needs.check-upstream.outputs.changed == 'true'
    timeout-minutes: 300
    steps:
      - name: 下载源码 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-source
          path: ${{ env.WORKING_DIRECTORY }}

      - name: 下载工具链 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-toolchain
          path: ${{ env.WORKING_DIRECTORY }}/staging_dir/

      - name: 下载软件包 artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-packages
          path: ${{ env.WORKING_DIRECTORY }}/bin/packages/

      - name: 恢复 dl 缓存（可选）
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}/dl
          key: dl-${{ needs.update-feeds.outputs.feeds_hash }}
          restore-keys: dl-

      - name: 生成最终固件
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          make target/image.compile -j$(nproc) V=sc

      - name: 上传固件 artifact（保留7天）
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86-64-images
          path: ${{ env.WORKING_DIRECTORY }}/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*squashfs-combined-efi.img.gz
          retention-days: 7
          if-no-files-found: warn

      - name: 保存配置文件到 artifacts
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          cp .config bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/config-latest.txt
          mkdir -p ../config-artifacts
          cp .config ../config-artifacts/immortalwrt-x86-64-config.txt

      - name: 上传单独配置文件 artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86-64-config
          path: config-artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: 上传固件到 Release（R86S-nightly）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: R86S-nightly
          files: |
            ${{ env.WORKING_DIRECTORY }}/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*squashfs-combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 记录磁盘空间使用（最终固件生成后）
        run: |
          echo "=== Job build-firmware 完成 ===" >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          du -sh ${{ env.WORKING_DIRECTORY }} | grep -oE '[0-9.]+[A-Z]' >> ${{ github.workspace }}/${{ env.CONFIG_HISTORY_DIR }}/space_usage-${{ env.TIMESTAMP }}.log
          df -h

      - name: 清理旧配置和空间使用记录文件（保留最近5个）
        run: |
          cd $GITHUB_WORKSPACE/${{ env.CONFIG_HISTORY_DIR }}
          
          # 清理旧配置文件（保留最近5个）
          CONFIG_COUNT=$(find . -maxdepth 1 -name 'config-*.txt' | wc -l)
          if [ $CONFIG_COUNT -gt 5 ]; then
            ls -1t config-*.txt | tail -n +6 | xargs -r rm -f
            echo "已清理旧配置文件，保留最近5个"
          else
            echo "配置文件数量不足5个（当前 $CONFIG_COUNT 个），跳过清理"
          fi
          
          # 清理旧空间使用记录文件（保留最近5个）
          SPACE_COUNT=$(find . -maxdepth 1 -name 'space_usage-*.log' | wc -l)
          if [ $SPACE_COUNT -gt 5 ]; then
            ls -1t space_usage-*.log | tail -n +6 | xargs -r rm -f
            echo "已清理旧空间使用记录文件，保留最近5个"
          else
            echo "空间使用记录文件数量不足5个（当前 $SPACE_COUNT 个），跳过清理"
          fi

      - name: 提交配置文件到仓库
        run: |
          cd $GITHUB_WORKSPACE
          git config user.email "swlplay@gmail.com"
          git config user.name "swlplay"
          git pull --rebase origin master
          git add ${{ env.CONFIG_HISTORY_DIR }}/
          if ! git diff --staged --quiet; then
            git commit -m "Update R86S-ImmortalWrt [skip ci]"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          fi