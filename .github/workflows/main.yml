
name: Monitor and Build ImmortalWrt (x86_64 Master)

on:
  # 定时触发：每周二18点检查更新（UTC时间）
  schedule:
    - cron: '0 18 * * 2'
  
  # 代码推送触发：推送到 master 分支时触发
  push:
    branches: [ master ]
  
  # Pull Request 触发：针对 master 分支的 PR 时触发
  pull_request:
    branches: [ master ]
  
  # 手动触发：允许在网页上手动触发
  workflow_dispatch:

env:
  TARGET: x86
  SUBTARGET: 64
  WORKING_DIRECTORY: immortalwrt-x86
  CONFIG_HISTORY_DIR: config-x86-64-history  # 新增配置历史目录变量

jobs:
 check-and-build:
  runs-on: ubuntu-22.04
  permissions:
    contents: write          # ← 保留在这里

  steps:
    - name: 释放前查看磁盘空间
      run: df -h

    - name: 手动删除额外工具缓存并清理 apt 缓存
      run: |
        echo "删除 /opt/hostedtoolcache ..."
        sudo rm -rf /opt/hostedtoolcache
        echo "删除其他大目录 ..."
        sudo rm -rf /usr/share/swift /usr/local/julia* /usr/lib/jvm /usr/local/.ghcup /usr/local/share/chromium /usr/share/dotnet /usr/local/lib/android
        echo "清理 apt 缓存 ..."
        sudo apt-get clean
        sudo apt-get autoclean
        sudo apt-get autoremove --purge -y
        docker image prune --force --filter "until=24h"

    - name: 释放磁盘空间 (easimon/maximize-build-space)
      uses: easimon/maximize-build-space@master
      with:
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        root-reserve-mb: 1024
        temp-reserve-mb: 100
        swap-size-mb: 4096
        overprovision-lvm: false

    - name: 释放后查看磁盘空间
      run: df -h

    # Checkout 仓库（宿主机）
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    # 准备环境变量文件（供容器内读取）
    - name: Prepare environment for container
      run: |
        echo "TARGET=${{ env.TARGET }}" > /tmp/build.env
        echo "SUBTARGET=${{ env.SUBTARGET }}" >> /tmp/build.env
        echo "WORKING_DIRECTORY=${{ env.WORKING_DIRECTORY }}" >> /tmp/build.env
        echo "CONFIG_HISTORY_DIR=${{ env.CONFIG_HISTORY_DIR }}" >> /tmp/build.env
        echo "GITHUB_WORKSPACE=${{ github.workspace }}" >> /tmp/build.env

    # 在容器中执行编译（所有编译步骤打包）
    - name: Build ImmortalWrt inside container
      uses: docker://ghcr.io/openwrt/buildbot/buildworker-v3.8.0:v9
      with:
        options: --user root -v ${{ github.workspace }}:/work -e "BUILDWORKER_NAME=my-openwrt-builder" -e "BUILDWORKER_PASSWORD=temp-pass"    
        options: --user root -v ${{ github.workspace }}:/work -v /tmp/build.env:/tmp/build.env:ro
        run: |
          set -ex

          # 读取环境变量
          source /tmp/build.env
          cd /work

          # 配置 git 安全目录
          git config --global --add safe.directory '*'

          # 克隆源码（浅克隆节省空间）
          git clone -b master --single-branch --depth=1 https://github.com/immortalwrt/immortalwrt ${WORKING_DIRECTORY}
          cd ${WORKING_DIRECTORY}

          # 获取最新 commit hash 并保存到 /work/commit_info.env（供宿主机后续步骤使用）
          LATEST_COMMIT_HASH=$(git rev-parse HEAD)
          echo "CURRENT_HASH=$LATEST_COMMIT_HASH" > /work/commit_info.env
          echo "TIMESTAMP=$(date +%Y%m%d-%H%M%S)" >> /work/commit_info.env
          echo "FORCE_UNSAFE_CONFIGURE=1" >> /work/commit_info.env

          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 复制预定义配置文件（假设在仓库的 $CONFIG_HISTORY_DIR/.config）
          cp /work/${CONFIG_HISTORY_DIR}/.config .config
          ls -la

          # 配置编译
          make defconfig
          ls -la

          # 记录初始空间使用
          mkdir -p /work/${CONFIG_HISTORY_DIR}
          du -sh . > /work/${CONFIG_HISTORY_DIR}/space_usage-${TIMESTAMP}.log
          df -h

          # 编译（使用 -j2）
          make -j2 V=sc

          # 记录编译后空间使用
          du -sh . >> /work/${CONFIG_HISTORY_DIR}/space_usage-${TIMESTAMP}.log
          df -h

          # 创建产物目录（挂载点下）
          mkdir -p /work/artifacts
          # 复制固件
          cp bin/targets/${TARGET}/${SUBTARGET}/*.img.gz /work/artifacts/ || true
          # 复制配置文件历史
          cp .config /work/${CONFIG_HISTORY_DIR}/config-${TIMESTAMP}.txt
          # 复制最新配置到产物
          cp .config /work/artifacts/config-latest.txt
          # 复制空间日志
          cp /work/${CONFIG_HISTORY_DIR}/space_usage-${TIMESTAMP}.log /work/artifacts/

    # 读取容器中生成的 commit 信息到环境变量
    - name: Load commit info from container
      id: load_info
      run: |
        if [ -f commit_info.env ]; then
          cat commit_info.env >> $GITHUB_ENV
          cat commit_info.env
        else
          echo "WARNING: commit_info.env not found"
        fi

    # 后续步骤：生成配置文件、清理旧配置、提交、缓存、上传等（宿主机）
    - name: Generate and save config files
      shell: bash
      run: |
        cd "$WORKING_DIRECTORY"
        # 确保配置文件已存在（容器内已复制）
        cp .config $GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR/config-$TIMESTAMP.txt
        mkdir -p bin/targets/$TARGET/$SUBTARGET/
        cp .config bin/targets/$TARGET/$SUBTARGET/config-latest.txt
        mkdir -p ../config-artifacts
        cp .config ../config-artifacts/immortalwrt-x86-64-config.txt
        echo "配置文件已保存：$CONFIG_HISTORY_DIR/config-$TIMESTAMP.txt"

    - name: Clean up old configs (keep last 20)
      shell: bash
      run: |
        cd $GITHUB_WORKSPACE/$CONFIG_HISTORY_DIR
        CONFIG_COUNT=$(find . -maxdepth 1 -name 'config-*.txt' -printf 'x\n' | wc -l)
        echo "当前配置文件数量: $CONFIG_COUNT"
        if [ $CONFIG_COUNT -gt 20 ]; then
          ls -1t config-*.txt | tail -n +21 | xargs -r rm -f
          echo "已清理旧配置文件，保留最新的20个"
        else
          echo "配置文件数量不足20个，跳过清理"
        fi

    - name: Commit config files to repository
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        git config user.email "swlplay@gmail.com"
        git config user.name "swlplay"
        git add "$CONFIG_HISTORY_DIR/"
        if git diff --staged --quiet; then
          echo "配置文件无变化，跳过提交"
        else
          git commit -m "Update ImmortalWrt configuration history [skip ci]"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
        fi

    - name: Upload build artifacts (固件和配置)
      uses: actions/upload-artifact@v4
      with:
        name: immortalwrt-x86-64-images
        path: artifacts/*.img.gz
        retention-days: 7
        if-no-files-found: warn

    - name: Upload config artifacts (单独配置文件)
      uses: actions/upload-artifact@v4
      with:
        name: immortalwrt-x86-64-config
        path: config-artifacts/
        retention-days: 30
        if-no-files-found: error

    - name: Build skipped due to cache (placeholder)
      shell: bash
      if: steps.cache-hash.outputs.cache-hit == 'true'
      run: |
        echo "注意：缓存逻辑已简化，请检查实际构建状态"
